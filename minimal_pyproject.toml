[project]
name = "envgs"
version = "0.1.0"
description = "Minimal uv environment for profile_render_sedan.py"
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.3.5",
    "pdbr>=0.9.2",
    "plyfile>=1.1.3",
    "rich>=14.2.0",
    "ruamel-yaml>=0.18.16",
    "torch==2.3.1",
    "tqdm>=4.67.1",
    "ujson>=5.11.0",
    "diff-surfel-rasterization-wet-ch05",
    "diff-surfel-tracing",
]

[tool.uv.sources]
torch = [
  { index = "cu128" },
]
diff-surfel-tracing = { path = "submodules/diff-surfel-tracing" }
diff-surfel-rasterization-wet-ch05 = { path = "submodules/diff-surfel-rasterizations/diff-surfel-rasterization-wet-ch05" }

[tool.uv.extra-build-dependencies]
diff-surfel-tracing = ["torch==2.3.1", "setuptools"]
diff-surfel-rasterization-wet-ch05 = ["torch==2.3.1"]

[[tool.uv.index]]
name = "cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
